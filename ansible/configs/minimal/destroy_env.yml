---
- name: Destroy workloads
  hosts: localhost
  gather_facts: false
  become: false
  tasks:
  - name: Set destroy workload list
    ansible.builtin.set_fact:
      _destroy_workloads: >-
        {{ remove_workloads
           if (remove_workloads | default([]) | length > 0)
           else (workloads | default([]) | reverse | list) }}

  - name: Destroy workload "{{ workload_loop_var | default('None') }}"
    when: _destroy_workloads | length > 0
    ansible.builtin.include_role:
      name: "{{ workload_loop_var }}"
    vars:
      ACTION: destroy
    loop: "{{ _destroy_workloads }}"
    loop_control:
      loop_var: workload_loop_var
