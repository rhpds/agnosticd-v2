---
- name: Destroy Troshka Environment
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Remove workloads
      when: remove_workloads | default([]) | length > 0
      ansible.builtin.include_role:
        name: "{{ workload_loop_var }}"
      vars:
        ACTION: destroy
      loop: "{{ remove_workloads }}"
      loop_control:
        loop_var: workload_loop_var

    - name: Delete Troshka project
      ansible.builtin.uri:
        url: "{{ troshka_api_url }}/api/v1/projects/{{ troshka_project_id }}"
        method: DELETE
        headers:
          Authorization: "Bearer {{ troshka_api_key }}"
        status_code: [204, 404]
      when: troshka_project_id is defined and troshka_project_id | length > 0
