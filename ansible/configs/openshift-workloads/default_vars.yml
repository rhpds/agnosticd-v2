---
# ===================================================================
# Additional Collections & roles to be installed for this config
# ===================================================================
# requirements_content:
#   collections:
#   # Core OpenShift Workloads
#   - name: https://github.com/rhpds/core_workloads.git
#     type: git
#     version: main

# List of Clusters with credentials
# A cluster with name `default` is used when no target clusters are specified for the individual workloads
# clusters:
#   openshift_app:
#     api_url: ...
#     api_token: ...
#
#   openshift_db:
#     api_url: ...
#     api_token: ...
# Credentials typically propagated from a multi-component openshift cluster.
# Default to empty so that destroy_env.yml does not fail with undefined
# variable errors when the component provision never completed.
# The destroyer role tests connectivity and skips unreachable clusters.
openshift_api_key: ""
openshift_api_url: ""
openshift_cluster_admin_token: ""

# If run standalone it is possible to provide connection details to a bastion host
# This allows executing tasks (like installing tools) on the bastion rather than in the
# Execution Environment
# The check is if bastion_ansible_host is defined. If so then the bastion is added to the Ansible group "bastions".
#
# bastion_ansible_host: ...
# bastion_ansible_port:
# bastion_ansible_user: ...
# bastion_ansible_ssh_pass: ...

clusters: {}

# List of workloads to apply to clusters with cluster selector
#
# If no clusters are specified then the default cluster is used.
# If clusters are specified cluster names must match a cluster in the list of clusters
#
# workloads:
# - name: agnosticd.core_workloads.ocp4_workload_authentication_htpasswd
#   clusters:
#   - openshift_app
#   - openshift_db
# - name: rhpds.mitzi.ocp4_workload_mitzi_app
#   clusters:
#   - openshift_app
# - name: rhpds.mitzi.ocp4_workload_mitzi_db
#   clusters:
#   - openshift_db
#
# Simple example (all workloads deployed to the default cluster):
# workloads:
# - agnosticd.core_workloads.ocp4_workload_authentication_htpasswd
# - rhpds.mitzi.ocp4_workload_mitzi_app
# - rhpds.mitzi.ocp4_workload_mitzi_db
workloads: []

# Which workloads to call when destroying the environment
remove_workloads: []
