---
# -------------------------------------------------------
# Step 001.1: Deploy Infrastructure
# -------------------------------------------------------
- name: Step 001.1 - Deploy Troshka Infrastructure
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Deploy to Troshka
      ansible.builtin.include_role:
        name: agnosticd.cloud_provider_troshka.deploy

# -------------------------------------------------------
# Step 001.2: Create Inventory and SSH Config
# -------------------------------------------------------
- name: Step 001.2 - Create Inventory
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Create inventory from Troshka project
      ansible.builtin.include_role:
        name: agnosticd.cloud_provider_troshka.create_inventory
      when: troshka_deploy_mode in ['pattern_workloads', 'template']

# -------------------------------------------------------
# Step 001.3: Wait for Linux Hosts
# -------------------------------------------------------
- name: Step 001.3 - Wait for Linux Hosts
  hosts: bastions
  gather_facts: false
  tasks:
    - name: Wait for SSH connectivity
      ansible.builtin.wait_for_connection:
        timeout: 300
      when: troshka_deploy_mode in ['pattern_workloads', 'template']
