---
- name: Download ROSA CLI
  ansible.builtin.get_url:
    url: "{{ rosa_installer_url }}"
    dest: /tmp/rosa-linux.tar.gz

- name: Install ROSA CLI
  become: true
  ansible.builtin.unarchive:
    src: /tmp/rosa-linux.tar.gz
    dest: "{{ rosa_binary_path }}"
    remote_src: true
    owner: root
    mode: u=rwx,go=rx
    extra_opts:
    - --no-same-owner

- name: Cleanup ROSA CLI archive
  ansible.builtin.file:
    path: /tmp/rosa-linux.tar.gz
    state: absent

- name: Create ROSA bash completion
  become: true
  ansible.builtin.shell:
    cmd: "{{ rosa_binary_path }}/rosa completion bash >/etc/bash_completion.d/rosa"
  changed_when: true
  failed_when: false
