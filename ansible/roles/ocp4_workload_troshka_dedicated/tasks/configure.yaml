---
- name: Set Troshka API base URL
  ansible.builtin.set_fact:
    _troshka_api: "https://{{ _troshka_route_host }}/api/v1"
    _api_headers:
      Content-Type: "application/json"
      X-Forwarded-Email: "{{ _requester_identity }}"
      X-Forwarded-User: "{{ _requester_identity }}"

- name: Wait for backend health
  ansible.builtin.uri:
    url: "{{ _troshka_api }}/health"
    validate_certs: false
  register: _health
  until: _health.status == 200
  retries: 30
  delay: 10
  ignore_errors: true

- name: Get cluster API URL
  ansible.builtin.set_fact:
    _cluster_api_url: "{{ sandbox_openshift_api_url | default(lookup('env', 'K8S_AUTH_HOST')) }}"

- name: Register OCP Virt provider
  ansible.builtin.uri:
    url: "{{ _troshka_api }}/providers/"
    method: POST
    headers: "{{ _api_headers }}"
    body_format: json
    body:
      name: "Local OCP Virt"
      type: "ocpvirt"
      default_region: "{{ troshka_namespace }}"
      default_image: "rhel10"
      token: "{{ _troshka_sa_token }}"
      namespace: "{{ troshka_namespace }}"
      api_url: "{{ _cluster_api_url }}"
    status_code: [200, 201]
    validate_certs: false
    follow_redirects: all
  register: _provider

- name: Create agent host
  ansible.builtin.uri:
    url: "{{ _troshka_api }}/hosts/"
    method: POST
    headers: "{{ _api_headers }}"
    body_format: json
    body:
      provider_id: "{{ _provider.json.id }}"
      name: "dedicated-host"
      instance_type: "custom"
      vcpus: "{{ troshka_host_vcpus }}"
      memory_gb: "{{ troshka_host_memory_gb }}"
      disk_gb: "{{ troshka_host_disk_gb }}"
    status_code: [200, 201]
    validate_certs: false
    follow_redirects: all
    validate_certs: false
    follow_redirects: all
  register: _host

- name: Wait for host to connect
  ansible.builtin.uri:
    url: "{{ _troshka_api }}/hosts/{{ _host.json.id }}"
    method: GET
    headers: "{{ _api_headers }}"
    validate_certs: false
    follow_redirects: all
  register: _host_status
  until: _host_status.json.agent_status == "connected"
  retries: 80
  delay: 15

