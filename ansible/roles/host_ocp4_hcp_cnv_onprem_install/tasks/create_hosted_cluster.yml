---
- name: Create the HostedCluster
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'hostedcluster.yaml.j2') | from_yaml }}"
    wait: true
    wait_timeout: 300

- name: Create the NodePool
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'nodepool.yaml.j2') | from_yaml }}"
    wait: true
    wait_timeout: 300
