---
- name: Set user data for OpenShift access
  agnosticd.core.agnosticd_user_info:
    data:
      openshift_api_server_url: "{{ hcp_onprem_result_api_url }}"
      openshift_console_url: "{{ hcp_onprem_result_console_url }}"
      openshift_cluster_ingress_domain: "{{ hcp_onprem_result_ingress_domain }}"
      openshift_cluster_admin_username: "{{ hcp_onprem_result_admin_user }}"
      openshift_cluster_admin_password: "{{ hcp_onprem_result_admin_password }}"

- name: Show user messages for OpenShift access
  agnosticd.core.agnosticd_user_info:
    msg: |-
      OpenShift Console: {{ hcp_onprem_result_console_url }}
      OpenShift API for command line 'oc' client: {{ hcp_onprem_result_api_url }}

      User `{{ hcp_onprem_result_admin_user }}` with password `{{ hcp_onprem_result_admin_password }}` is cluster admin.

- name: Show user credentials per user
  when: hcp_onprem_result_user_passwords | default([]) | length > 0
  agnosticd.core.agnosticd_user_info:
    msg: |-
      {% for i in range(hcp_onprem_result_user_passwords | length) %}
      User `{{ hcp_onprem_user_base }}{{ i + 1 }}` password: `{{ hcp_onprem_result_user_passwords[i] }}`
      {% endfor %}

- name: Display cluster access information
  ansible.builtin.debug:
    msg: |
      ============================================================
      HCP Cluster Deployed Successfully
      ============================================================
      Cluster Name:  {{ hcp_onprem_result_cluster_name }}
      OCP Version:   {{ hcp_onprem_result_ocp_version }}
      Console:       {{ hcp_onprem_result_console_url }}
      API Server:    {{ hcp_onprem_result_api_url }}
      Ingress:       *.{{ hcp_onprem_result_ingress_domain }}
      ============================================================
      Admin User:    {{ hcp_onprem_result_admin_user }}
      Admin Pass:    {{ hcp_onprem_result_admin_password }}
      ============================================================
      Workers:       {{ hcp_onprem_result_worker_count }} ready ({{ hcp_onprem_worker_count }} desired)
      Worker Sizing: {{ hcp_onprem_worker_cores }} cores, {{ hcp_onprem_worker_memory }} RAM
      ============================================================
