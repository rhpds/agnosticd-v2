---
- name: Approve CSRs and wait for worker nodes
  module_defaults:
    group/k8s:
      host: "{{ openshift_api_url }}"
      api_key: "{{ openshift_cluster_admin_token }}"
      validate_certs: false
  block:
  - name: Write CSR approval script
    ansible.builtin.copy:
      dest: "{{ output_dir }}/approve_csrs.sh"
      mode: "0755"
      content: |
        #!/bin/bash
        # Approve pending CSRs and wait for expected worker nodes
        API="{{ openshift_api_url }}"
        TOKEN="{{ openshift_cluster_admin_token }}"
        EXPECTED={{ current_instance_workers | int + worker_instance_count | int }}
        RETRIES={{ approve_csr_retries }}
        DELAY={{ approve_csr_delay }}

        for i in $(seq 1 $RETRIES); do
          # Approve all pending CSRs
          PENDING=$(oc get csr --server="$API" --token="$TOKEN" --insecure-skip-tls-verify \
            -o jsonpath='{range .items[?(@.status == {})]}{.metadata.name}{"\n"}{end}' 2>/dev/null || true)
          if [ -n "$PENDING" ]; then
            echo "$PENDING" | xargs -I{} oc adm certificate approve {} \
              --server="$API" --token="$TOKEN" --insecure-skip-tls-verify 2>/dev/null || true
            APPROVED=$(echo "$PENDING" | wc -l | tr -d ' ')
            echo "Iteration $i/$RETRIES: approved $APPROVED CSRs"
          fi

          # Count ready worker nodes (exclude control-plane)
          READY=$(oc get nodes --server="$API" --token="$TOKEN" --insecure-skip-tls-verify \
            -l 'node-role.kubernetes.io/worker=,!node-role.kubernetes.io/control-plane,!node-role.kubernetes.io/master' \
            -o jsonpath='{range .items[*]}{.status.conditions[?(@.type=="Ready")].status}{"\n"}{end}' 2>/dev/null \
            | grep -c "True" || echo 0)

          echo "Iteration $i/$RETRIES: $READY/$EXPECTED workers ready"
          if [ "$READY" -ge "$EXPECTED" ]; then
            echo "All $EXPECTED workers ready"
            exit 0
          fi

          sleep $DELAY
        done

        echo "ERROR: Only $READY/$EXPECTED workers ready after $RETRIES attempts"
        exit 1

  - name: Run CSR approval loop
    ansible.builtin.command:
      cmd: "{{ output_dir }}/approve_csrs.sh"
    register: _r_csr_approval
    changed_when: "'approved' in _r_csr_approval.stdout"

  - name: Show CSR approval result
    ansible.builtin.debug:
      msg: "{{ _r_csr_approval.stdout_lines[-3:] }}"
    when: _r_csr_approval.stdout_lines | length > 0
