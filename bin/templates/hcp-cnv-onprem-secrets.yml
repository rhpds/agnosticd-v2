---
# =============================================================================
# Secrets for On-Prem HCP/CNV Cluster Deployment
# =============================================================================
# WARNING: This file contains sensitive credentials. Do not commit to git.
#
# Provide EITHER token OR username+password for management cluster auth.
# =============================================================================

# ---------------------------------------------------------------------------
# Management cluster authentication (Option A: token)
# ---------------------------------------------------------------------------
hcp_onprem_mgmt_token: "sha256~REPLACE_WITH_YOUR_TOKEN"

# ---------------------------------------------------------------------------
# Management cluster authentication (Option B: username/password)
# ---------------------------------------------------------------------------
# hcp_onprem_mgmt_username: "admin"
# hcp_onprem_mgmt_password: "REPLACE_WITH_PASSWORD"

# ---------------------------------------------------------------------------
# OpenShift pull secret
# Get from https://console.redhat.com/openshift/install/pull-secret
# ---------------------------------------------------------------------------
ocp4_pull_secret: '{"auths":{"cloud.openshift.com":{"auth":"REPLACE"},"quay.io":{"auth":"REPLACE"},"registry.connect.redhat.com":{"auth":"REPLACE"},"registry.redhat.io":{"auth":"REPLACE"}}}'

# ---------------------------------------------------------------------------
# nsupdate credentials (only if using nsupdate DNS method)
# ---------------------------------------------------------------------------
# hcp_onprem_nsupdate_key_name: "mykey"
# hcp_onprem_nsupdate_key_secret: "BASE64_ENCODED_KEY"
